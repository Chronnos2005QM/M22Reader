<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M22 Reader</title>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #bb86fc; text-align: left; font-size: 24px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1e1e1e; border-radius: 4px; overflow: hidden; transition: 0.3s; border: 1px solid #222; }
        .card:active { transform: scale(0.95); background: #333; }
        .capa { width: 100%; height: 160px; background: #2c2c2c; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; text-align: center; }
        .info { padding: 8px; font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>
    <h1>M22 Reader <span style="font-size: 12px; color: #666;">v1.0</span></h1>
    <div class="grid">
        {% for livro in livros %}
        <div class="card">
            <div class="capa">SEM CAPA<br>(M22 Motor)</div>
            <div class="info">{{ livro }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
